<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; }
    #videoBlock { max-width: 720px; }
    #lesson {
      width: 100%;
      vertical-align: middle;
      background: #000;
      border-radius: 4px;
    }
    #btnPlay, #btnContinue {
      font: inherit;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }
    #btnPlay:disabled, #btnContinue:disabled { cursor: not-allowed; opacity: 0.6; }
    #continueWrap { margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div id="videoBlock">
    <video
      id="lesson"
      playsinline
      preload="metadata"
      controlsList="nodownload noplaybackrate"
      disablePictureInPicture
      src="Video/test.mp4">
    </video>

    <div id="playWrap" style="margin-top: 0.5rem;">
      <button type="button" id="btnPlay">Play</button>
    </div>

    <div id="continueWrap" style="display: none;">
      <button type="button" id="btnContinue">Continue</button>
    </div>
  </div>

  <script>
    (function () {
      var v = document.getElementById("lesson");
      var btnPlay = document.getElementById("btnPlay");
      var continueWrap = document.getElementById("continueWrap");
      var btnContinue = document.getElementById("btnContinue");

      var maxSeen = 0;

      btnPlay.addEventListener("click", function () {
        v.play().catch(function () {});
        btnPlay.disabled = true;
      });

      v.addEventListener("timeupdate", function () {
        if (!v.seeking && v.currentTime > maxSeen) {
          maxSeen = v.currentTime;
        }
      });

      v.addEventListener("seeking", function () {
        if (v.currentTime > maxSeen + 0.25) {
          v.currentTime = maxSeen;
        }
      });

      v.addEventListener("ended", function () {
        continueWrap.style.display = "block";
        btnContinue.disabled = false;
      });

      btnContinue.addEventListener("click", function () {
        alert("Replace this handler with your Qualtrics next-step logic.");
      });
    })();
  </script>
</body>
</html>
